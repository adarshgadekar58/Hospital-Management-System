<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - MediFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

/* BACKGROUND */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0ea5a4,#3b82f6);
}

/* CONTAINER */
.login-container{
width:350px;
padding:35px;
border-radius:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
color:white;
animation:fadeIn 0.8s ease;
}

/* TITLE */
.login-container h2{
text-align:center;
margin-bottom:25px;
}

/* INPUT GROUP */
.input-group{
position:relative;
margin-bottom:20px;
}

.input-group i{
position:absolute;
top:50%;
left:12px;
transform:translateY(-50%);
color:#e0f2fe;
}

/* INPUT */
.input-group input{
width:100%;
padding:12px 40px 12px 40px;
border:none;
border-radius:10px;
outline:none;
background:rgba(255,255,255,0.25);
color:white;
}

/* PASSWORD TOGGLE */
.toggle-pass{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:white;
}

/* PLACEHOLDER */
::placeholder{
color:#e0f2fe;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:white;
color:#0ea5a4;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
padding:25px;
}

/* ERROR */
.error{
color:#f87171;
font-size:14px;
margin-bottom:10px;
text-align:center;
display:none;
}

/* ANIMATION */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="login-container">

<h2>Admin Login</h2>

<!-- ERROR -->
<div class="error" id="errorMsg">Please fill all fields</div>

<form id="loginForm" action="AdminLoginServlet" method="post">

<div class="input-group">
<i class="fa fa-user-shield"></i>
<input type="text" id="username" name="username" placeholder="Admin Username" required>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="password" name="password" placeholder="Password" required>
<i class="fa fa-eye toggle-pass" onclick="togglePassword()"></i>
</div>

<button type="submit">Login</button>


</form>

</div>

<script>

// SHOW / HIDE PASSWORD
function togglePassword(){
const pass = document.getElementById("password");
const icon = document.querySelector(".toggle-pass");

if(pass.type === "password"){
pass.type = "text";
icon.classList.remove("fa-eye");
icon.classList.add("fa-eye-slash");
}else{
pass.type = "password";
icon.classList.remove("fa-eye-slash");
icon.classList.add("fa-eye");
}
}

// VALIDATION
document.getElementById("loginForm").addEventListener("submit", function(e){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;
const error = document.getElementById("errorMsg");

if(username.trim() === "" || password.trim() === ""){
e.preventDefault();
error.style.display = "block";
}else{
error.style.display = "none";
}

});

// SHOW ERROR FROM SERVLET
const params = new URLSearchParams(window.location.search);

if(params.get("error") === "1"){
document.getElementById("errorMsg").innerText = "Invalid Username or Password";
document.getElementById("errorMsg").style.display = "block";
}

</script>

</body>
</html>
